name: retraining

on:
push:
branches:
- main

jobs:
retrain:
runs-on: ubuntu-latest

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install MLflow
    run: |
      pip install mlflow

  - name: Run MLProject
    run: |
      cd MLProject
      mlflow run .

